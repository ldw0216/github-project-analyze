<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub & AI Daily Insight Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --bg-color: #f6f8fa; --sidebar-bg: #24292f; --card-bg: #ffffff; 
            --text-main: #24292f; --text-sub: #57606a; --btn-color: #2da44e; 
            --ai-color: #8a2be2; --news-color: #ff6600; --biz-color: #0052cc;
            --feas-color: #16a085; --save-color: #f1c40f; --border-color: #d0d7de;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-color); }
        
        .sidebar { width: 230px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding-top: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h2 { text-align: center; font-size: 1.1em; margin-bottom: 20px; letter-spacing: 1px; }
        
        .global-api-box { padding: 0 15px 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .global-api-box p { margin: 0 0 8px 0; font-size: 0.75em; color: #8b949e; }
        .global-api-box input { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 6px; border: none; font-size: 13px; outline: none; background: #0d1117; color: #c9d1d9; }
        
        .menu-btn { background: none; border: none; color: #c9d1d9; padding: 15px 20px; text-align: left; font-size: 14px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .menu-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-btn.active { background: #0969da; color: white; border-left: 4px solid #58a6ff; }
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .section { display: none; animation: fadeIn 0.3s ease; max-width: 850px; margin: 0 auto; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-search { padding: 15px; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1em; margin-bottom: 20px; transition: 0.2s; }
        .btn-search:active { transform: scale(0.98); }
        .btn-ai { background: var(--ai-color); }
        .btn-news { background: var(--news-color); }
        .btn-biz { background: var(--biz-color); }
        .btn-feas { background: var(--feas-color); }
        .btn-pdf { background: #555; font-size: 0.9em; padding: 10px; margin-bottom: 20px; display: none; }
        
        .btn-save-item { background: #fff; border: 1px solid var(--save-color); color: var(--save-color); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em; transition: 0.2s; float: right; margin-left: 10px; }
        .btn-save-item:hover { background: var(--save-color); color: white; }
        .github-link-tag { display: inline-block; background: #24292f; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.85em; text-decoration: none; margin-top: 10px; margin-right: 8px; transition: 0.2s; }
        .github-link-tag:hover { background: #444; }

        .repo-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 25px; margin-bottom: 25px; transition: 0.2s; position: relative; }
        .repo-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .repo-card h3 { margin: 0 0 10px 0; font-size: 1.3em; color: #0969da; cursor: pointer; display: inline-block; }
        .repo-desc { margin: 0 0 15px 0; color: var(--text-main); font-size: 1em; line-height: 1.5; }
        
        .ai-insight-box { border-radius: 8px; padding: 18px; margin-bottom: 15px; font-size: 0.95em; line-height: 1.7; color: #24292f; border: 1px solid transparent; }
        .insight-title { font-weight: bold; font-size: 1.05em; margin-bottom: 5px; display: block; }
        
        .theme-ai .ai-insight-box { background: #f8fbff; border-color: #c8e1ff; }
        .theme-news .ai-insight-box { background: #fff8f0; border-color: #ffcc99; }
        .theme-biz .ai-insight-box { background: #f0f5ff; border-color: #b3d4ff; }
        .theme-feas .ai-insight-box { background: #f2faf8; border-color: #a3e4d7; }
        .theme-save .ai-insight-box { background: #fffef0; border-color: #f7dc6f; }

        .loading { text-align: center; font-weight: bold; margin-top: 50px; font-size: 1.1em; color: var(--text-sub); }

        @media (max-width: 600px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            .main-content { padding: 15px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>🚀 GitHub Hub (Daily)</h2>
        <div class="global-api-box">
            <p>🔑 OpenAI API Key</p>
            <input type="password" id="global-api-key" placeholder="sk-..." oninput="saveApiKey()">
        </div>
        <button class="menu-btn active" id="btn-ainews" onclick="switchTab('ainews')">📰 실시간 IT 뉴스</button>
        <button class="menu-btn" id="btn-trending" onclick="switchTab('trending')">✨ 오늘의 트렌드 분석</button>
        <button class="menu-btn" id="btn-business" onclick="switchTab('business')">💼 비즈니스 인사이트</button>
        <button class="menu-btn" id="btn-feasibility" onclick="switchTab('feasibility')">🎯 실현 가능성 분석</button>
        <button class="menu-btn" id="btn-vault" onclick="switchTab('vault')">📂 아이디어 저장소</button>
    </nav>

    <main class="main-content">
        
        <section id="ainews" class="section theme-news active">
            <h2>📰 실시간 AI/IT 뉴스 브리핑</h2>
            <button class="btn-search btn-news" onclick="fetchNewsWithAI()">📡 지금 이 시간 뉴스 요약</button>
            <div id="news-list"></div>
        </section>

        <section id="trending" class="section theme-ai">
            <h2>🔥 오늘의 글로벌 트렌드 심층 분석</h2>
            <button class="btn-search btn-ai" onclick="fetchTrendingWithAI()">🚀 오늘 뜬 20개 저장소 분석</button>
            <div id="trending-list"></div>
        </section>

        <section id="business" class="section theme-biz">
            <h2>💼 일간 데이터 기반 비즈니스 기획</h2>
            <button class="btn-search btn-biz" onclick="fetchBusinessInsights()">💡 오늘의 기술-뉴스 융합 기획 시작</button>
            <button id="pdf-download-btn" class="btn-search btn-pdf" onclick="downloadPDF()">📄 리포트 PDF 다운로드</button>
            <div id="biz-list"></div>
        </section>

        <section id="feasibility" class="section theme-feas">
            <h2>🎯 기획안 실현 가능성 심층 분석</h2>
            <div style="background: #e8f6f3; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #a3e4d7;">
                <p style="margin:0; font-size: 0.9em; color: #16a085; font-weight:bold;">
                    ✅ 비즈니스 인사이트 기획안을 분석하며, 실현 가능성이 70점 이상인 경우 자동으로 저장소에 보관됩니다.
                </p>
            </div>
            <button class="btn-search btn-feas" onclick="fetchFeasibility()">🔍 현재 기획안 분석하기</button>
            <div id="feasibility-result"></div>
        </section>

        <section id="vault" class="section theme-save">
            <h2>📂 저장된 아이디어 및 추천 기술</h2>
            <div id="vault-list"></div>
        </section>

        <!-- 상세 기획 섹션 -->
        <section id="detail-plan" class="section theme-save">
            <button class="btn-save-item" onclick="switchTab('vault')" style="float:none; margin-bottom: 20px; color:#57606a; border-color:#d0d7de;">🔙 저장소 목록으로 돌아가기</button>
            <h2 style="margin-top: 0;">🛠️ 상세 기획 및 구현 가이드</h2>
            <div id="detail-plan-result"></div>
        </section>

    </main>

<script>
    let currentInsights = [];
    let currentFeasibilities = [];

    window.onload = () => {
        const savedKey = localStorage.getItem('openai_api_key');
        if (savedKey) document.getElementById('global-api-key').value = savedKey;
        renderVault();
    };

    function saveApiKey() {
        localStorage.setItem('openai_api_key', document.getElementById('global-api-key').value.trim());
    }

    function getApiKey() {
        const key = document.getElementById('global-api-key').value.trim();
        if (!key) { alert("API 키를 먼저 입력해주세요!"); return null; }
        return key;
    }

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        
        const activeBtn = document.getElementById('btn-' + tabId);
        if(activeBtn) activeBtn.classList.add('active');
        
        if(tabId === 'vault') renderVault();
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const bizList = document.getElementById('biz-list');
        const btn = document.getElementById('pdf-download-btn');
        btn.innerText = "⏳ PDF 생성 중...";
        try {
            const canvas = await html2canvas(bizList, { scale: 2, useCORS: true, backgroundColor: "#f6f8fa" });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgProps = pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save(`Business_Insight_${new Date().toLocaleDateString()}.pdf`);
            btn.innerText = "📄 리포트 PDF 다운로드";
        } catch (error) {
            alert("PDF 생성 중 오류 발생");
            btn.innerText = "📄 리포트 PDF 다운로드";
        }
    }

    function saveToVault(type, index, isAuto = false) {
        let savedItems = JSON.parse(localStorage.getItem('saved_ideas') || '[]');
        let itemToSave = type === 'biz' ? currentInsights[index] : currentFeasibilities[index];
        
        if (savedItems.some(item => item.title === itemToSave.title)) {
            if(!isAuto) alert("이미 저장된 아이디어입니다.");
            return;
        }

        savedItems.push({ ...itemToSave, savedAt: new Date().toLocaleString(), type: type });
        localStorage.setItem('saved_ideas', JSON.stringify(savedItems));
        
        if(!isAuto) alert("저장소에 안전하게 보관되었습니다!");
        renderVault();
    }

    function renderVault() {
        const vaultContainer = document.getElementById('vault-list');
        const savedItems = JSON.parse(localStorage.getItem('saved_ideas') || '[]');
        
        if (savedItems.length === 0) {
            vaultContainer.innerHTML = '<div class="loading">아직 저장된 아이디어가 없습니다. <br>아이디어를 분석하거나 우측 상단의 저장 버튼을 눌러보세요!</div>';
            return;
        }

        vaultContainer.innerHTML = '';
        savedItems.forEach((item, idx) => {
            let linksHtml = item.githubLinks && item.githubLinks.length > 0 
                ? item.githubLinks.map(l => `<a href="${l.url}" target="_blank" class="github-link-tag">🔗 ${l.name}</a>`).join(' ') 
                : '<span style="color:gray; font-size:0.9em;">링크 데이터 없음</span>';

            let contentHtml = '';
            let scoreHtml = '';
            let borderStyle = '';
            let themeClass = '';

            if (item.type === 'biz') {
                themeClass = 'theme-biz';
                contentHtml = `
                    <div class="ai-insight-box">
                        <div class="insight-content"><span class="insight-title" style="color:var(--biz-color);">🛠️ 기획안</span>${item.idea}</div>
                        <div class="insight-content"><span class="insight-title" style="color:var(--biz-color);">🎯 타겟 고객 및 수익 모델</span>${item.target}</div>
                        <div class="insight-content"><span class="insight-title" style="color:var(--biz-color);">⚙️ 추천 기술 스택</span>${item.techStack || '기술 정보 없음'}</div>
                        <div class="insight-content"><span class="insight-title" style="color:var(--biz-color);">🔗 참고 GitHub 저장소</span>${linksHtml}</div>
                    </div>`;
            } else if (item.type === 'feas') {
                themeClass = 'theme-feas';
                let scoreColor = item.score >= 70 ? '#2ecc71' : (item.score >= 40 ? '#f39c12' : '#e74c3c');
                borderStyle = `border-left: 8px solid ${scoreColor};`;
                scoreHtml = `<div style="font-size: 1.5em; font-weight: bold; color: ${scoreColor}; margin-bottom: 15px;">실현 지수: ${item.score}점</div>`;
                contentHtml = `
                    <div class="ai-insight-box">
                        <div class="insight-content"><span class="insight-title" style="color:var(--feas-color);">💰 대학생 맞춤 비용 분석</span>${item.costEvaluation}</div>
                        <div class="insight-content"><span class="insight-title" style="color:var(--feas-color);">🛠️ 추천 기술 스택</span>${item.techStack}</div>
                        <div class="insight-content"><span class="insight-title" style="color:var(--feas-color);">🚀 3단계 로드맵</span>${item.stepByStep}</div>
                        <div class="insight-content"><span class="insight-title" style="color:var(--feas-color);">🔗 참고 GitHub 저장소</span>${linksHtml}</div>
                    </div>`;
            }

            vaultContainer.innerHTML += `
                <div class="repo-card ${themeClass}" style="${borderStyle}">
                    <button onclick="deleteFromVault(${idx})" style="position:absolute; right:20px; top:20px; border:none; background:none; color:#e74c3c; cursor:pointer; font-weight:bold;">❌ 삭제</button>
                    <button onclick="generateDetailPlan(${idx})" style="position:absolute; right:90px; top:20px; border:none; background:none; color:#3498db; cursor:pointer; font-weight:bold;">🛠️ 상세 기획</button>
                    
                    <h3 style="color:var(--save-color); margin-right:150px; cursor:default; text-decoration:none;">⭐ ${item.title}</h3>
                    <p style="font-size:0.8em; color:gray; margin-bottom:15px;">저장일: ${item.savedAt}</p>
                    ${item.context ? `<p style="color:gray; font-size:0.9em; margin-bottom:15px;"><strong>기획 배경:</strong> ${item.context}</p>` : ''}
                    ${scoreHtml}
                    ${contentHtml}
                </div>`;
        });
    }

    function deleteFromVault(idx) {
        let savedItems = JSON.parse(localStorage.getItem('saved_ideas') || '[]');
        savedItems.splice(idx, 1);
        localStorage.setItem('saved_ideas', JSON.stringify(savedItems));
        renderVault();
    }

    // 💡 [수정됨] 오류 방지 formatText가 적용된 상세 기획 생성 함수
    async function generateDetailPlan(idx) {
        const apiKey = getApiKey(); if (!apiKey) return;
        const savedItems = JSON.parse(localStorage.getItem('saved_ideas') || '[]');
        const item = savedItems[idx];
        if (!item) return;

        switchTab('detail-plan');
        const container = document.getElementById('detail-plan-result');
        container.innerHTML = `<div class="loading" style="color:#3498db;">📡 '${item.title}' 프로젝트의 상세 구현 계획을 AI가 설계 중입니다...<br>(약 30~50초 소요)</div>`;

        try {
            const prompt = `너는 시니어 소프트웨어 아키텍트이자 PM이야. 다음 아이디어를 대학생/주니어 개발자가 1달 안에 직접 구현할 수 있도록 '상세 기획 및 구현 가이드'를 작성해줘.
            
            [아이디어 정보]
            - 제목: ${item.title}
            - 내용: ${item.idea || item.stepByStep || item.context}
            - 기술스택: ${item.techStack || '추천 바람'}

            [수행 작업]
            1. "architecture": 시스템 아키텍처 및 데이터베이스 스키마 간략 설계
            2. "coreFeatures": 반드시 구현해야 할 핵심 기능(MVP) 3가지와 API 명세 스케치
            3. "milestone": 1주차~4주차까지의 구체적인 개발 마일스톤(주차별 목표)
            4. "tips": 개발 중 마주칠 수 있는 예상 장애물과 해결 팁

            모든 내용은 반드시 매끄러운 '한국어'로 작성해.
            반드시 JSON 형식으로 응답해:
            {
              "architecture": "...",
              "coreFeatures": "...",
              "milestone": "...",
              "tips": "..."
            }`;

            const aiRes = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "gpt-4o-mini", response_format: { type: "json_object" }, messages: [{ role: "user", content: prompt }] })
            });

            const aiData = await aiRes.json();
            if (aiData.error) throw new Error(aiData.error.message);

            const detail = JSON.parse(aiData.choices[0].message.content);

            // 데이터 타입을 안전하게 문자열로 변환하는 헬퍼 함수
            const formatText = (data) => {
                if (!data) return "내용 없음";
                if (Array.isArray(data)) return data.join('<br><br>');
                if (typeof data === 'object') return JSON.stringify(data);
                return String(data).replace(/\n/g, '<br>');
            };

            container.innerHTML = `
                <div class="repo-card" style="border-top: 5px solid #3498db;">
                    <h3 style="color:#3498db; cursor:default; text-decoration:none;">🚀 ${item.title} - 기획 및 구현 가이드</h3>
                    <p style="color:gray; font-size:0.9em; margin-bottom:15px;">이 가이드는 실질적인 개발 착수를 위해 생성된 마일스톤입니다.</p>
                    
                    <div class="ai-insight-box" style="background:#ebf5fb; border-color:#d6eaf8;">
                        <div class="insight-content"><span class="insight-title" style="color:#2980b9;">🏗️ 시스템 아키텍처 및 DB 설계</span>${formatText(detail.architecture)}</div>
                        <div class="insight-content"><span class="insight-title" style="color:#2980b9;">🔑 핵심 기능 (MVP) 및 API 스케치</span>${formatText(detail.coreFeatures)}</div>
                        <div class="insight-content"><span class="insight-title" style="color:#2980b9;">📅 4주 개발 마일스톤</span>${formatText(detail.milestone)}</div>
                        <div class="insight-content"><span class="insight-title" style="color:#2980b9;">💡 예상 장애물 및 해결 팁</span>${formatText(detail.tips)}</div>
                    </div>
                </div>
            `;
        } catch (e) { 
            container.innerHTML = `<div class="loading" style="color:red;">❌ 상세 기획 생성 실패: ${e.message}</div>`; 
            console.error(e); 
        }
    }

    // 1. 실시간 뉴스 로직 (첫 탭)
    async function fetchNewsWithAI() {
        const apiKey = getApiKey(); if (!apiKey) return;
        const listContainer = document.getElementById('news-list');
        listContainer.innerHTML = '<div class="loading">📡 실시간 해커뉴스 수집 중...</div>';
        try {
            const hnRes = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
            const topIds = await hnRes.json();
            const stories = await Promise.all(topIds.slice(0, 25).map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json())));
            const valid = stories.filter(s => s && s.title && s.url).map(s => ({ title: s.title, url: s.url, score: s.score || 0 }));

            listContainer.innerHTML = '<div class="loading" style="color:var(--news-color);">✨ AI가 영문 기사들을 요약 및 분석 중입니다...</div>';
            
            const prompt = `실리콘밸리 특파원으로서 IT 뉴스 5~7개를 한국어로 요약하고 분석해.
            반드시 JSON 형식으로 응답해: { "news": [{"title":"", "originalTitle":"", "implication":"", "url":"", "score":0}] }
            데이터: ${JSON.stringify(valid)}`;

            const aiRes = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "gpt-4o-mini", response_format: { type: "json_object" }, messages: [{ role: "user", content: prompt }], temperature: 0.4 })
            });

            const aiData = await aiRes.json();
            if (aiData.error) throw new Error(aiData.error.message);

            const parsed = JSON.parse(aiData.choices[0].message.content);
            listContainer.innerHTML = '';
            
            parsed.news.forEach(item => {
                listContainer.innerHTML += `
                    <div class="repo-card">
                        <h3 onclick="window.open('${item.url}', '_blank')" style="color:var(--news-color);">${item.title}</h3>
                        <p style="color:#8b949e; font-size:0.85em; margin-bottom:15px;">원문: ${item.originalTitle || 'Unknown'}</p>
                        <div class="ai-insight-box">
                            <div class="insight-content"><span class="insight-title" style="color:#e65100;">📰 뉴스 파급력 및 핵심 요약</span>${item.implication}</div>
                        </div>
                        <div class="repo-stats"><span>🔥 추천수: ${item.score}</span></div>
                    </div>`;
            });
        } catch (e) { listContainer.innerHTML = `<div class="loading" style="color:red;">❌ 오류 발생: ${e.message}</div>`; }
    }

    // 2. 깃허브 트렌드
    async function fetchTrendingWithAI() {
        const apiKey = getApiKey(); if (!apiKey) return;
        const listContainer = document.getElementById('trending-list');
        listContainer.innerHTML = '<div class="loading">📡 오늘의 최신 깃허브 데이터를 가져오는 중...</div>';

        try {
            const date = new Date(); date.setDate(date.getDate() - 1);
            const sinceDate = date.toISOString().split('T')[0];
            const ghRes = await fetch(`https://api.github.com/search/repositories?q=created:>${sinceDate}&sort=stars&order=desc`);
            const ghData = await ghRes.json();
            
            if (!ghData.items) throw new Error("GitHub 데이터를 불러오지 못했습니다.");
            
            const rawRepos = ghData.items.slice(0, 20).map(r => ({ name: r.full_name, desc: r.description, url: r.html_url, stars: r.stargazers_count, lang: r.language }));

            listContainer.innerHTML = '<div class="loading" style="color:var(--ai-color);">✨ AI가 오늘 생성된 20개 프로젝트를 분석 중입니다...</div>';
            
            const prompt = `시니어 기술 분석가로서 오늘 생성된 20개 저장소를 분석해. 1개도 누락하지 마.
            모든 카테고리명, 설명(desc), 분석(analysis), 적용 예시(useCase)는 반드시 매끄러운 '한국어'로 번역하고 작성해.
            반드시 JSON 형식으로 응답해: { "categories": [ { "categoryName": "", "repos": [{"name":"", "desc":"", "analysis":"", "useCase":"", "url":"", "stars":0, "lang":""}] } ] }
            데이터: ${JSON.stringify(rawRepos)}`;

            const aiRes = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "gpt-4o-mini", response_format: { type: "json_object" }, messages: [{ role: "user", content: prompt }], temperature: 0.3 })
            });

            const aiData = await aiRes.json();
            if (aiData.error) throw new Error(aiData.error.message);

            const parsedData = JSON.parse(aiData.choices[0].message.content);
            listContainer.innerHTML = '';
            
            parsedData.categories.forEach(category => {
                let html = `<div class="category-group"><h3 class="category-title" style="color:var(--ai-color); border-color:var(--ai-color);">📂 ${category.categoryName}</h3>`;
                category.repos.forEach(repo => {
                    html += `
                        <div class="repo-card">
                            <h3 onclick="window.open('${repo.url}', '_blank')">${repo.name}</h3>
                            <p class="repo-desc">${repo.desc}</p>
                            <div class="ai-insight-box">
                                <div class="insight-content"><span class="insight-title">💡 심층 트렌드 분석</span>${repo.analysis}</div>
                                <div class="insight-content"><span class="insight-title">🚀 서비스 적용 예시</span>${repo.useCase}</div>
                            </div>
                            <div class="repo-stats"><span>⭐ ${repo.stars.toLocaleString()}</span><span>🔵 ${repo.lang || 'Unknown'}</span></div>
                        </div>`;
                });
                html += `</div>`;
                listContainer.innerHTML += html;
            });
        } catch (e) { listContainer.innerHTML = `<div class="loading" style="color:red;">❌ 오류 발생: ${e.message}</div>`; }
    }

    // 3. 비즈니스 인사이트 로직
    async function fetchBusinessInsights() {
        const apiKey = getApiKey(); if (!apiKey) return;
        const listContainer = document.getElementById('biz-list');
        const downloadBtn = document.getElementById('pdf-download-btn');
        downloadBtn.style.display = 'none';
        listContainer.innerHTML = '<div class="loading">📡 기술/뉴스 교차 분석 중...</div>';
        
        try {
            const date = new Date(); date.setDate(date.getDate() - 1);
            const sinceDate = date.toISOString().split('T')[0];
            const ghRes = await fetch(`https://api.github.com/search/repositories?q=created:>${sinceDate}&sort=stars&order=desc`);
            const ghData = await ghRes.json();
            const rawRepos = ghData.items.slice(0, 12).map(r => ({ name: r.full_name, desc: r.description }));

            const hnRes = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
            const topIds = await hnRes.json();
            const stories = await Promise.all(topIds.slice(0, 15).map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json())));
            const news = stories.map(s => s.title);

            const prompt = `오늘의 GitHub 트렌드와 IT 뉴스를 결합해 한국어로 사업 아이템 3개를 기획해. 
            각 기획마다 구체적인 기술 스택(techStack)과 관련된 실제 오픈소스 GitHub 링크(githubLinks)를 2개씩 찾아줘.
            반드시 JSON 형식으로 응답해: { "insights": [{"title":"", "context":"", "idea":"", "target":"", "techStack":"", "githubLinks":[{"name":"", "url":""}]}] } 
            데이터: ${JSON.stringify({gh: rawRepos, news: news})}`;
            
            const aiRes = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "gpt-4o-mini", response_format: { type: "json_object" }, messages: [{ role: "user", content: prompt }] })
            });
            const aiData = await aiRes.json();
            const parsed = JSON.parse(aiData.choices[0].message.content);
            
            currentInsights = parsed.insights;

            listContainer.innerHTML = `<h1 style="text-align:center; color:#0052cc;">Daily Business Insight Report</h1><hr style="border:1px solid #eee; margin-bottom:30px;">`;
            currentInsights.forEach((item, idx) => {
                let linksHtml = item.githubLinks && item.githubLinks.length > 0 
                    ? item.githubLinks.map(l => `<a href="${l.url}" target="_blank" class="github-link-tag">🔗 ${l.name}</a>`).join(' ') 
                    : '<span style="color:gray; font-size:0.9em;">링크 데이터 없음</span>';

                listContainer.innerHTML += `
                    <div class="repo-card">
                        <button class="btn-save-item" onclick="saveToVault('biz', ${idx})">⭐ 저장하기</button>
                        <h3 style="cursor:default; text-decoration:none;">💡 ${item.title}</h3>
                        <p style="color:gray; font-size:0.9em; margin-bottom:15px;"><strong>기획 배경:</strong> ${item.context}</p>
                        <div class="ai-insight-box">
                            <div class="insight-content"><span class="insight-title" style="color:var(--biz-color);">🛠️ 기획안</span>${item.idea}</div>
                            <div class="insight-content"><span class="insight-title" style="color:var(--biz-color);">🎯 타겟 고객 및 수익 모델</span>${item.target}</div>
                            <div class="insight-content"><span class="insight-title" style="color:var(--biz-color);">⚙️ 추천 기술 스택</span>${item.techStack || '기술 정보 없음'}</div>
                            <div class="insight-content"><span class="insight-title" style="color:var(--biz-color);">🔗 참고 GitHub 저장소</span>${linksHtml}</div>
                        </div>
                    </div>`;
            });
            downloadBtn.style.display = 'block';
        } catch (e) { listContainer.innerHTML = "오류 발생"; }
    }

    // 4. 실현 가능성 분석 로직
    async function fetchFeasibility() {
        const apiKey = getApiKey(); if (!apiKey) return;
        if (currentInsights.length === 0) {
            alert("먼저 '비즈니스 인사이트' 탭에서 아이디어를 생성해주세요!");
            switchTab('business');
            return;
        }

        const listContainer = document.getElementById('feasibility-result');
        listContainer.innerHTML = '<div class="loading">📡 생성된 기획안들을 대학생 관점에서 정밀 분석 중입니다...</div>';

        try {
            const prompt = `너는 스타트업 멘토야. 아래 '비즈니스 기획안'들을 대학생 신분(예산 50만원 미만)에서 실현할 수 있는지 냉정하게 평가해줘.
            특히, 대학생이 무료로 쓸 수 있는 프레임워크나 API를 조합한 구체적인 'techStack'과 참고할만한 '실제 GitHub 오픈소스 저장소 링크(githubLinks)' 2개를 반드시 포함해.
            반드시 JSON 형식으로 응답해:
            {
              "feasibilityReports": [
                { "title": "", "score": 80, "costEvaluation": "", "techStack": "", "stepByStep": "", "githubLinks": [{"name":"", "url":""}] }
              ]
            }
            기획안 데이터: ${JSON.stringify(currentInsights)}`;

            const aiRes = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "gpt-4o-mini", response_format: { type: "json_object" }, messages: [{ role: "user", content: prompt }] })
            });

            const aiData = await aiRes.json();
            const parsedData = JSON.parse(aiData.choices[0].message.content);
            currentFeasibilities = parsedData.feasibilityReports;
            
            listContainer.innerHTML = '';
            
            currentFeasibilities.forEach((report, idx) => {
                let scoreColor = report.score >= 70 ? '#2ecc71' : (report.score >= 40 ? '#f39c12' : '#e74c3c');
                
                if (report.score >= 70) saveToVault('feas', idx, true);

                let linksHtml = report.githubLinks && report.githubLinks.length > 0 
                    ? report.githubLinks.map(l => `<a href="${l.url}" target="_blank" class="github-link-tag">🔗 ${l.name}</a>`).join(' ') 
                    : '<span style="color:gray; font-size:0.9em;">링크 데이터 없음</span>';

                listContainer.innerHTML += `
                    <div class="repo-card" style="border-left: 8px solid ${scoreColor};">
                        <button class="btn-save-item" onclick="saveToVault('feas', ${idx})">⭐ 저장하기</button>
                        <h3 style="cursor:default; text-decoration:none;">🎯 ${report.title}</h3>
                        <div style="font-size: 1.5em; font-weight: bold; color: ${scoreColor}; margin-bottom: 15px;">실현 지수: ${report.score}점</div>
                        ${report.score >= 70 ? `<span style="background:#e8f8f5; color:#16a085; padding:4px 8px; border-radius:4px; font-size:0.8em; font-weight:bold; margin-bottom:15px; display:inline-block;">자동 저장됨</span>` : ''}
                        
                        <div class="ai-insight-box">
                            <div class="insight-content"><span class="insight-title" style="color:var(--feas-color);">💰 대학생 맞춤 비용 분석</span>${report.costEvaluation}</div>
                            <div class="insight-content"><span class="insight-title" style="color:var(--feas-color);">🛠️ 추천 기술 스택</span>${report.techStack}</div>
                            <div class="insight-content"><span class="insight-title" style="color:var(--feas-color);">🚀 3단계 로드맵</span>${report.stepByStep}</div>
                            <div class="insight-content"><span class="insight-title" style="color:var(--feas-color);">🔗 참고 GitHub 저장소</span>${linksHtml}</div>
                        </div>
                    </div>`;
            });
        } catch (e) { listContainer.innerHTML = `<div class="loading" style="color:red;">❌ 분석 실패: ${e.message}</div>`; }
    }
</script>
